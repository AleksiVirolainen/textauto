databases:
  - name: textauto-db
    plan: free
    databaseName: textauto
    user: textauto

services:
  - type: web
    name: textauto-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: textauto-db
          property: connectionString
